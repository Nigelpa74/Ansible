---
- name: Configuración de MikroTik vía SSH
  hosts: mikrotik_router
  gather_facts: no
  vars_files:
    - secrets.yml

  tasks:
    - name: 1. Subir llave ssh pública al almacenamiento del MikroTik
      ansible.netcommon.net_put:
        src: ~/.ssh/id_ed25519.pub
        dest: id_mikrotik.pub

#    - name: 2. Importar llave al usuario pi
#      community.routeros.command:
#        commands:
#          - /user ssh-keys import public-key-file=id_mikrotik.pub user=pi
    
    - name: 3. Endurecer seguridad SSH (Strong Crypto)
      community.routeros.command:
        commands:
          - /ip ssh set strong-crypto=yes forwarding-enabled=local
          - /ip ssh set host-key-type=ed25519
#          - /ip ssh regenerate-host-key

    - name: 4. Limpiar archivo de llave del almacenamiento
      community.routeros.command:
        commands:
          - /file remove id_mikrotik.pub
